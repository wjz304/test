name: Redpill Build (schedule)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:


jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Find schedule issues
        id: find-issues
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'find-issues'
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-state: 'all'
          #title-includes: 'custom'
          labels: 'schedule'

      - name: Generate build matrix
        id: set-matrix
        uses: actions/github-script@v6
        with:
          script: |
            let matrix = {};
            matrix.issues = ${{ steps.find-issues.outputs.issues }};
            core.setOutput("matrix",JSON.stringify(matrix));


  build:
    runs-on: ubuntu-latest
    needs: matrix
    environment: production
    strategy:
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Echo issues Info
        run: |
          ls -al
          echo "number:     ${{ matrix.issues.number }}"
          echo "issueauth:  ${{ matrix.issues.auth }}"
          echo "issuetitle: ${{ matrix.issues.title }}"
          echo "issuebody:  ${{ matrix.issues.body }}"
      
       #error: 
       #   Can't find 'action.yml', 'action.yaml' or 'Dockerfile' under '/home/runner/work/test/.github/workflows/custom.yml'. 
       #   Did you forget to run actions/checkout before running your local action?
      
      - name: Loop on issues
        uses: wjz304/test/.github/workflows/custom.yml@main
        with:
          issuenumber: ${{ matrix.issues.number }}
          issueauth: ${{ matrix.issues.auth }}
          issuetitle: ${{ matrix.issues.title }}
          issuebody: ${{ matrix.issues.body }}

